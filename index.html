<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Auto Manga Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background-color: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; color: white; }
        .input-section { padding: 20px; width: 100%; text-align: center; background: #333; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid orange;}
        input[type="text"] { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #555; background: #000; color: #0f0; margin-right: 10px;}
        button { padding: 10px 20px; font-size: 16px; background: orange; border: none; cursor: pointer; font-weight: bold; }
        .reader-container { max-width: 800px; width: 100%; background: #000; min-height: 100vh; padding-bottom: 50px; margin-top: 10px;}
        .reader-container img { display: block; width: 100%; height: auto; margin-bottom: 2px; }
        .controls { position: fixed; bottom: 20px; right: 20px; background: orange; padding: 15px; border-radius: 50%; cursor: pointer; color: black; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="input-section">
        <input type="text" id="urlInput" placeholder="Dán link chap truyện vào đây (vd: https://thienthanxinh5.online/...)">
        <button onclick="fetchAndDecrypt()">ĐỌC TRUYỆN</button>
    </div>

    <div class="reader-container" id="chapter-content">
        <p style="text-align: center; padding: 50px;">Nhập link truyện và nhấn nút để tải.</p>
    </div>

    <div class="controls" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">UP</div>

    <script>
        async function fetchAndDecrypt() {
            const url = document.getElementById('urlInput').value.trim();
            const container = document.getElementById('chapter-content');
            
            if (!url) return alert("Vui lòng nhập link truyện!");

            container.innerHTML = '<p style="text-align: center; padding: 50px;">Đang tải và tự động giải mã dữ liệu (Mất khoảng 3-5 giây)...</p>';

            try {
                // 1. Gọi Proxy để lấy HTML
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Lỗi mạng khi gọi Proxy!");
                
                const result = await response.json();
                const htmlText = result.contents;

                // 2. Tìm biến htmlContent
                const regex = /var htmlContent = "(.*?)";/;
                const match = htmlText.match(regex);

                if (!match) throw new Error("Không tìm thấy dữ liệu truyện trong link này!");

                // 3. Xử lý chuỗi JSON
                const rawJsonString = JSON.parse('"' + match[1] + '"');
                const data = JSON.parse(rawJsonString);

                const passphrase = "QfSv5w6pALt73EpPKX";

                // 4. Giải mã AES
                const key = CryptoJS.PBKDF2(passphrase, CryptoJS.enc.Hex.parse(data.salt), {
                    keySize: 256 / 32,
                    iterations: 999,
                    hasher: CryptoJS.algo.SHA512
                });

                const decrypted = CryptoJS.AES.decrypt(data.ciphertext, key, {
                    iv: CryptoJS.enc.Hex.parse(data.iv)
                });

                let decryptedHtml = decrypted.toString(CryptoJS.enc.Utf8);

                if (!decryptedHtml) throw new Error("Giải mã thất bại (Sai key bảo mật)!");

                // 5. Giải mã ký tự URL
                const cleanHtml = decryptedHtml
                    .replace(/QfSv5w/g, '.')
                    .replace(/6pALt7/g, ':')
                    .replace(/3EpPKX/g, '/');

                // 6. XỬ LÝ LAZY LOAD (ÉP HIỂN THỊ TOÀN BỘ ẢNH)
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = cleanHtml;
                
                const imgs = tempDiv.querySelectorAll('img');
                imgs.forEach(img => {
                    // Lấy link thật từ data-qfsv5w
                    let realLink = img.getAttribute('data-qfsv5w') || img.getAttribute('data-src') || img.getAttribute('src');
                    
                    // Kiểm tra nếu là link thật (bắt đầu bằng http) thì nhét vào src
                    if (realLink && realLink.startsWith('http')) {
                        img.src = realLink; 
                    }

                    // Dọn dẹp rác để trình duyệt không bị nhầm lẫn
                    img.removeAttribute('data-qfsv5w');
                    img.removeAttribute('data-lazy-src');
                    img.removeAttribute('srcset'); 
                    img.className = ''; 
                });

                // 7. Đẩy ra giao diện
                container.innerHTML = tempDiv.innerHTML;
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                container.innerHTML = `<p style="text-align: center; color: red; padding: 50px;">Lỗi: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
